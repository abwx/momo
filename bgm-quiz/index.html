<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>寻找你的人生BGM</title>
  <link rel="stylesheet" href="style.css">
  <!-- 引入 FontAwesome 图标库 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- 动态背景 -->
    <div class="bg-animation"></div>

    <!-- 全局 BGM 控制按钮 -->
    <div id="bgm-toggle" class="bgm-toggle">
      <i class="fas fa-music"></i>
    </div>
    <!-- 背景音乐音频 (默认循环) -->
    <audio id="home-bgm" src="audio/M500003gDRkQ2QpSKD.mp3" loop preload="auto"></audio>

    <!-- 1. 首页 (黑胶唱片视觉) -->
    <div id="home-screen" class="screen active">
      <div class="vinyl-container">
        <!-- 增加涟漪动画元素 -->
        <div class="ripple ripple-1"></div>
        <div class="ripple ripple-2"></div>
        <div class="ripple ripple-3"></div>
        <div class="vinyl-record">
          <div class="vinyl-center"></div>
        </div>
      </div>
      <h1 class="main-title">寻找你的人生BGM</h1>
      <p class="subtitle">如果生命是一张唱片，<br>此刻的你，正在播放哪一首？</p>
      <button id="start-btn" class="btn-primary glow-effect"><i class="fas fa-headphones"></i> 戴上耳机，开始测试</button>
    </div>

    <!-- 2. 测试页 -->
    <div id="quiz-screen" class="screen">
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <div class="question-container glass-panel">
        <span id="question-number">01</span>
        <h2 id="question-text">问题内容</h2>
        <div id="options-container"></div>
      </div>
    </div>

    <!-- 3. 结果页 (音乐播放器视觉) -->
    <div id="result-screen" class="screen">
      <h2 class="result-header">你的灵魂频率属于</h2>
      <div class="player-card glass-panel">
        
        <!-- 大封面区域 -->
        <div class="cover-art-large" id="result-cover-container">
          <img id="result-cover-img" src="" alt="Album Cover">
          <div class="equalizer" id="equalizer-anim">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        
        <!-- 标题与特质 -->
        <h1 id="result-title">风格名称</h1>
        <div id="result-traits" class="traits-container"></div>
        <p id="result-desc">风格描述</p>
        
        <!-- 自定义 HTML5 播放器 -->
        <div class="custom-audio-player">
          <div class="track-meta">
            <div class="track-name" id="track-name">歌曲名</div>
            <div class="track-artist" id="track-artist">歌手名</div>
          </div>
          
          <div class="progress-container" id="progress-container">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="audio-progress"></div>
            </div>
            <div class="time-row">
              <span id="time-current">00:00</span>
              <span id="time-total">00:00</span>
            </div>
          </div>

          <div class="player-controls">
            <button id="custom-play-btn" class="play-circle-btn"><i class="fas fa-pause"></i></button>
          </div>
        </div>

      </div>

      <!-- 补充结果信息详情卡片 -->
      <div class="result-details glass-panel">
        <div class="detail-section">
          <h3 class="detail-title"><i class="fas fa-quote-left"></i> 人生格言</h3>
          <p id="result-motto" class="detail-text quote-text">人生格言</p>
        </div>
        <div class="detail-section">
          <h3 class="detail-title"><i class="fas fa-brain"></i> 深度解析</h3>
          <p id="result-analysis" class="detail-text">深度解析内容</p>
        </div>
        <div class="detail-section row-layout">
          <div class="detail-box">
            <h3 class="detail-title"><i class="fas fa-wind"></i> 灵魂氛围</h3>
            <p id="result-vibe" class="detail-text highlight-text">氛围</p>
          </div>
          <div class="detail-box">
            <h3 class="detail-title"><i class="fas fa-handshake"></i> 契合频率</h3>
            <p id="result-match" class="detail-text highlight-text">契合度</p>
          </div>
        </div>
      </div>
      
      <div class="action-buttons">
        <button id="share-btn" class="btn-secondary"><i class="fas fa-share-alt"></i> 分享我的BGM</button>
        <button id="retry-btn" class="btn-text"><i class="fas fa-redo"></i> 重新测试</button>
      </div>
    </div>

    <!-- 4. 全部结果页 (专辑列表视觉) -->
    <div id="all-results-screen" class="screen">
      <button id="back-home-btn" class="btn-icon-top"><i class="fas fa-arrow-left"></i></button>
      <h2 class="section-title">全部人生BGM</h2>
      <p class="section-subtitle">探索灵魂的不同切面，点击试听</p>
      <div id="all-results-grid" class="results-grid">
        <!-- JS 动态生成卡片 -->
      </div>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
