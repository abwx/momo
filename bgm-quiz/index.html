<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>寻找你的人生BGM</title>
  <link rel="stylesheet" href="style.css">
  <!-- 引入 FontAwesome 图标库 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- 动态背景 -->
    <div class="bg-animation"></div>

    <!-- 1. 首页 (黑胶唱片视觉) -->
    <div id="home-screen" class="screen active">
      <div class="vinyl-container">
        <div class="vinyl-record">
          <div class="vinyl-center"></div>
        </div>
      </div>
      <h1 class="main-title">寻找你的人生BGM</h1>
      <p class="subtitle">如果生命是一张唱片，<br>此刻的你，正在播放哪一首？</p>
      <button id="start-btn" class="btn-primary glow-effect"><i class="fas fa-headphones"></i> 戴上耳机，开始测试</button>
      <button id="view-all-btn" class="btn-text">浏览全部人生专辑</button>
    </div>

    <!-- 2. 测试页 -->
    <div id="quiz-screen" class="screen">
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <div class="question-container glass-panel">
        <span id="question-number">01</span>
        <h2 id="question-text">问题内容</h2>
        <div id="options-container"></div>
      </div>
    </div>

    <!-- 3. 结果页 (音乐播放器视觉) -->
    <div id="result-screen" class="screen">
      <h2 class="result-header">你的灵魂频率属于</h2>
      <div class="player-card glass-panel">
        <div class="cover-art" id="result-cover">
          <div class="equalizer" id="equalizer-anim">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <h1 id="result-title">风格名称</h1>
        <p id="result-desc">风格描述</p>
        
        <div class="audio-controls">
          <!-- 这里将被替换为真实的 iframe 播放器或保留原生控制 -->
          <div id="real-player-container" style="width: 100%;"></div>
        </div>
      </div>
      
      <div class="action-buttons">
        <button id="share-btn" class="btn-secondary"><i class="fas fa-share-alt"></i> 分享我的BGM</button>
        <button id="retry-btn" class="btn-text"><i class="fas fa-redo"></i> 重新测试</button>
        <button id="view-all-btn-result" class="btn-text" style="margin-top: 10px;"><i class="fas fa-compact-disc"></i> 探索其他人生BGM</button>
      </div>
    </div>

    <!-- 4. 全部结果页 (专辑列表视觉) -->
    <div id="all-results-screen" class="screen">
      <button id="back-home-btn" class="btn-icon-top"><i class="fas fa-arrow-left"></i></button>
      <h2 class="section-title">全部人生BGM</h2>
      <p class="section-subtitle">探索灵魂的不同切面，点击试听</p>
      <div id="all-results-grid" class="results-grid">
        <!-- JS 动态生成卡片 -->
      </div>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
